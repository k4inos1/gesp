# Configuración para Render.com
services:
  - type: web
    name: gesapp-frontend
    buildCommand: |
      npm install -g npm@latest
      node render-build.js
    staticPublishPath: dist/gesapp-angular
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.19.2
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"
    routes:
      - type: rewrite
        source: '/*'
        destination: '/index.html'
        headers:
          - key: Cache-Control
            value: 'no-cache, no-store, must-revalidate'
          - key: Pragma
            value: 'no-cache'
          - key: Expires
            value: '0'
