# Configuración para Render.com
services:
  - type: web
    name: gesapp-frontend
    env: node
    buildCommand: |
      npm install
      npm run build:prod
    staticPublishPath: dist/gesapp-angular
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.19.2
    routes:
      - type: rewrite
        source: '/*'
        destination: '/index.html'
