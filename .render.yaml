# Configuración para Render.com
services:
  - type: web
    name: gesapp-frontend
    env: node
    buildCommand: |
      npm install
      npm install -g @angular/cli @angular-devkit/build-angular
      npm run build:prod
    staticPublishPath: dist/gesapp-angular
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /
