# Frontend configuration for Render
services:
  - type: web
    name: gesapp-frontend
    runtime: node
    buildCommand: npm run render:deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.19.2
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"
      - key: NG_CLI_ANALYTICS
        value: "false"
