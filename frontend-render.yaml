# Frontend configuration for Render
services:
  - type: web
    name: gesapp-frontend
    runtime: node
    buildCommand: |
      npm install
      npm install -g @angular/cli@17
      ng build --configuration production --output-path=dist/gesapp-angular --output-hashing=all
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /
