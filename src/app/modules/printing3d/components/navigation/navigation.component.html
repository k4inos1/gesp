<div class="printing3d-navigation">
  <div class="nav-header">
    <h2>Impresión 3D en Educación</h2>
    <p>Herramientas y recursos para integrar la impresión 3D en el aula</p>
  </div>

  <div class="nav-cards">
    <mat-card 
      *ngFor="let link of navLinks" 
      [ngClass]="{'active': isActive(link.path)}"
      (click)="navigateTo(link.path)">
      <mat-card-content>
        <div class="card-content">
          <mat-icon>{{link.icon}}</mat-icon>
          <div class="card-text">
            <h3>{{link.label}}</h3>
            <p>{{link.description}}</p>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="nav-tabs">
    <nav mat-tab-nav-bar [tabPanel]="tabPanel">
      <a mat-tab-link
         *ngFor="let link of navLinks"
         [routerLink]="['/printing3d', link.path]"
         [active]="isActive(link.path)">
        <mat-icon>{{link.icon}}</mat-icon>
        <span>{{link.label}}</span>
      </a>
    </nav>
    <mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>
  </div>
</div>
