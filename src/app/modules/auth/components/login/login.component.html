<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Iniciar Sesión</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="ejemplo@email.com">
          <mat-error *ngIf="loginForm.get('email')?.invalid">
            {{ getErrorMessage('email') }}
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Contraseña</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.invalid">
            {{ getErrorMessage('password') }}
          </mat-error>
        </mat-form-field>

        <div class="actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid || loading" class="full-width">
            <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
            <span *ngIf="!loading">Iniciar Sesión</span>
          </button>

          <div class="separator">
            <span>o</span>
          </div>

          <button mat-stroked-button type="button" (click)="signInWithGoogle()" [disabled]="googleLoading" class="full-width google-btn">
            <img src="assets/images/google-icon.svg" alt="Google" class="google-icon">
            <mat-spinner diameter="20" *ngIf="googleLoading"></mat-spinner>
            <span *ngIf="!googleLoading">Continuar con Google</span>
          </button>
        </div>
      </form>
        </mat-card-content>

    <mat-card-actions class="card-footer">
      <span>¿No tienes cuenta? </span>
      <a mat-button color="primary" routerLink="/auth/register">Regístrate</a>
    </mat-card-actions>
  </mat-card>
</div>
